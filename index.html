<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BuildFlow - 3D House Marketplace</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
      <div class="container">
        <a class="navbar-brand" href="#">BuildFlow Architecture</a>
        <div class="d-flex">
          <button class="btn btn-outline-light">Login</button>
        </div>
      </div>
    </nav>

    <div class="container">
      <div class="text-center mb-5">
        <h1 class="display-5 fw-bold">Explore Your Dream Home</h1>
        <p class="text-muted">
          Interact with our 3D architectural models before building.
        </p>
      </div>

      <div class="row" id="models-container">
        <div class="text-center text-primary">
          <div class="spinner-border" role="status">
            <span class="visually-hidden">Loading Models...</span>
          </div>
          <p class="mt-2">Loading 3D Models from Database...</p>
        </div>
      </div>
    </div>

    <script
      type="module"
      src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"
    ></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script src="js/marketplace.js"></script>
  </body>
</html>
