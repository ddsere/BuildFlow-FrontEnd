<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BuildFlow - Admin Dashboard</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
      <div class="container">
        <a class="navbar-brand fw-bold text-warning" href="#"
          >BuildFlow ADMIN</a
        >
        <div class="d-flex">
          <a href="index.html" class="btn btn-outline-light"
            >Go to Marketplace</a
          >
        </div>
      </div>
    </nav>

    <div class="container mb-5">
      <div class="row justify-content-center">
        <div class="col-md-8">
          <div class="card shadow-sm border-0">
            <div class="card-header bg-primary text-white text-center py-3">
              <h4 class="mb-0">Add New 3D House Model</h4>
            </div>
            <div class="card-body p-4">
              <div id="alertMessage"></div>

              <form id="addModelForm">
                <div class="mb-3">
                  <label class="form-label fw-bold">Model Name</label>
                  <input
                    type="text"
                    id="modelName"
                    class="form-control"
                    required
                    placeholder="e.g. Modern Villa"
                  />
                </div>

                <div class="mb-3">
                  <label class="form-label fw-bold">Description</label>
                  <textarea
                    id="description"
                    class="form-control"
                    rows="3"
                    required
                    placeholder="Brief description about the house..."
                  ></textarea>
                </div>

                <div class="row">
                  <div class="col-md-4 mb-3">
                    <label class="form-label fw-bold"
                      >Estimated Cost (Rs.)</label
                    >
                    <input
                      type="number"
                      id="estimatedCost"
                      class="form-control"
                      required
                      placeholder="e.g. 8500000"
                    />
                  </div>
                  <div class="col-md-4 mb-3">
                    <label class="form-label fw-bold">Floor Area (sq.ft)</label>
                    <input
                      type="number"
                      id="floorArea"
                      class="form-control"
                      required
                      placeholder="e.g. 1500"
                    />
                  </div>
                  <div class="col-md-4 mb-3">
                    <label class="form-label fw-bold">Bedrooms</label>
                    <input
                      type="number"
                      id="numBedrooms"
                      class="form-control"
                      required
                      placeholder="e.g. 3"
                    />
                  </div>
                </div>

                <div class="mb-3">
                  <label class="form-label fw-bold"
                    >3D Model File Path (.glb)</label
                  >
                  <input
                    type="text"
                    id="modelUrl"
                    class="form-control"
                    required
                    placeholder="e.g. assets/models/my_house.glb"
                  />
                  <small class="text-muted"
                    >Make sure the file is inside the assets/models
                    folder.</small
                  >
                </div>

                <div class="mb-4">
                  <label class="form-label fw-bold"
                    >Image Cover Path (.jpg/.png)</label
                  >
                  <input
                    type="text"
                    id="imgUrl"
                    class="form-control"
                    required
                    placeholder="e.g. assets/images/cover.jpg"
                  />
                </div>

                <button
                  type="submit"
                  class="btn btn-primary w-100 fw-bold py-2"
                >
                  Save Model to Database
                </button>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="js/admin.js"></script>
  </body>
</html>
